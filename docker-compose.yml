services:
  postgres:
    image: postgres:17-alpine
    container_name: vizi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vizi}
      POSTGRES_USER: ${POSTGRES_USER:-vizi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - vizi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vizi-postgres-data:
