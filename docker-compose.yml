services:
  postgres:
    image: postgres:17-alpine
    container_name: vizi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vizi}
      POSTGRES_USER: ${POSTGRES_USER:-vizi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - vizi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  background-removal:
    build:
      context: ./background-removal
    environment:
      REMBG_MODEL: ${BACKGROUND_REMOVAL_MODEL:-u2netp}
      BACKGROUND_REMOVAL_SHARED_TOKEN: ${BACKGROUND_REMOVAL_SHARED_TOKEN:-}
    ports:
      - "7000:7000"
    volumes:
      - vizi-rembg-models:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  vizi-postgres-data:
  vizi-rembg-models:
