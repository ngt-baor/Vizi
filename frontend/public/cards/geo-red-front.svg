<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540">
  <defs>
    <clipPath id="card">
      <rect width="900" height="540" rx="22" ry="22"/>
    </clipPath>
    <!-- Soft depth on red facets -->
    <linearGradient id="redBase" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0%" stop-color="#c43c38"/>
      <stop offset="45%" stop-color="#b4282a"/>
      <stop offset="100%" stop-color="#8e121c"/>
    </linearGradient>
    <pattern id="whiteGeo" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M48 0 L96 48 L48 96 L0 48 Z" fill="none" stroke="#d9d9d9" stroke-width="1.05"/>
      <path d="M0 0 L96 96 M96 0 L0 96" fill="none" stroke="#e8e8e8" stroke-width="0.85"/>
      <path d="M48 0 V96 M0 48 H96" fill="none" stroke="#ececec" stroke-width="0.7"/>
    </pattern>
    <!-- Clip red panel so facets stay inside curved edge -->
    <clipPath id="redPanel">
      <path d="M0 0
        H257
        C240 40 210 90 194 120
        C170 170 160 220 163 270
        C165 320 175 370 193 420
        C210 460 235 500 257 540
        H0 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- White field + geometry lattice -->
    <rect width="900" height="540" fill="#fafafa"/>
    <rect width="900" height="540" fill="url(#whiteGeo)" opacity="0.95"/>

    <!-- Red low-poly panel (curved right edge from mockup measurements) -->
    <g clip-path="url(#redPanel)">
      <rect width="320" height="540" fill="url(#redBase)"/>

      <!-- Facet mesh: multi-tone triangles matching mockup red histogram -->
      <g stroke="none">
        <!-- top band -->
        <path d="M0 0 L140 0 L70 95 Z" fill="#d4554f"/>
        <path d="M140 0 L260 0 L200 70 L110 85 Z" fill="#c43c38"/>
        <path d="M260 0 L320 0 L320 90 L210 75 Z" fill="#a8242a"/>
        <path d="M0 0 L70 95 L0 150 Z" fill="#9a1c24"/>

        <!-- upper-mid -->
        <path d="M70 95 L200 70 L175 175 L40 190 Z" fill="#b83032"/>
        <path d="M200 70 L320 90 L300 185 L175 175 Z" fill="#8e121c"/>
        <path d="M0 150 L40 190 L20 290 L0 270 Z" fill="#7a0e18"/>
        <path d="M40 190 L175 175 L155 295 L25 310 Z" fill="#c9403c"/>
        <path d="M175 175 L300 185 L280 300 L155 295 Z" fill="#a01c26"/>

        <!-- mid -->
        <path d="M0 270 L20 290 L15 400 L0 380 Z" fill="#6e0c14"/>
        <path d="M20 290 L155 295 L145 410 L10 420 Z" fill="#9e2028"/>
        <path d="M155 295 L280 300 L265 415 L145 410 Z" fill="#d24a44"/>
        <path d="M280 300 L320 280 L320 420 L265 415 Z" fill="#b02830"/>

        <!-- lower -->
        <path d="M0 380 L10 420 L30 520 L0 540 Z" fill="#5c0a12"/>
        <path d="M10 420 L145 410 L160 520 L35 540 Z" fill="#c03836"/>
        <path d="M145 410 L265 415 L250 530 L160 520 Z" fill="#8a141e"/>
        <path d="M265 415 L320 420 L320 540 L250 530 Z" fill="#a82028"/>
        <path d="M30 520 L160 520 L257 540 L0 540 Z" fill="#741018"/>

        <!-- extra highlight shards -->
        <path d="M90 40 L170 25 L150 100 L85 110 Z" fill="#e06860" opacity="0.55"/>
        <path d="M50 240 L130 220 L120 300 L45 310 Z" fill="#e87870" opacity="0.35"/>
        <path d="M180 340 L250 320 L240 400 L170 410 Z" fill="#6a0e16" opacity="0.45"/>
        <path d="M60 450 L140 430 L150 510 L70 520 Z" fill="#e06058" opacity="0.4"/>
      </g>

      <!-- Facet edge lines (white, low opacity) -->
      <g fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.35" stroke-linejoin="round">
        <path d="M0 0 L140 0 L70 95 L0 150 Z"/>
        <path d="M140 0 L260 0 L200 70 L110 85 L70 95 Z"/>
        <path d="M70 95 L200 70 L175 175 L40 190 Z"/>
        <path d="M200 70 L320 90 L300 185 L175 175 Z"/>
        <path d="M40 190 L175 175 L155 295 L25 310 Z"/>
        <path d="M175 175 L300 185 L280 300 L155 295 Z"/>
        <path d="M20 290 L155 295 L145 410 L10 420 Z"/>
        <path d="M155 295 L280 300 L265 415 L145 410 Z"/>
        <path d="M10 420 L145 410 L160 520 L35 540 Z"/>
        <path d="M145 410 L265 415 L250 530 L160 520 Z"/>
        <path d="M90 40 L170 25 L150 100 L85 110 Z"/>
        <path d="M50 240 L130 220 L120 300 L45 310 Z"/>
      </g>

      <!-- thin internal lattice -->
      <g fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="0.9">
        <path d="M30 30 L160 120 L80 220"/>
        <path d="M100 140 L220 100 L200 230 L110 250"/>
        <path d="M40 300 L160 280 L140 420 L50 440"/>
        <path d="M120 400 L240 360 L220 500 L100 520"/>
      </g>
    </g>

    <!-- Soft highlight along curved seam -->
    <path d="M257 0
      C240 40 210 90 194 120
      C170 170 160 220 163 270
      C165 320 175 370 193 420
      C210 460 235 500 257 540"
      fill="none" stroke="#ffffff" stroke-opacity="0.38" stroke-width="2.2"/>

    <!-- Double hexagon logo (centered on white field) -->
    <g transform="translate(545 168)" fill="none" stroke="#9b1a22" stroke-linejoin="round">
      <polygon points="0,-58 50,-29 50,29 0,58 -50,29 -50,-29" stroke-width="9"/>
      <polygon points="0,-34 29.5,-17 29.5,17 0,34 -29.5,17 -29.5,-17" stroke-width="8"/>
      <!-- radial connectors between hex rings -->
      <path d="M-29.5 -17 L-50 -29 M29.5 -17 L50 -29 M29.5 17 L50 29 M-29.5 17 L-50 29 M0 -34 L0 -58 M0 34 L0 58" stroke-width="6.5"/>
    </g>

    <text x="545" y="292" text-anchor="middle"
      font-family="Arial, Helvetica, 'Segoe UI', sans-serif"
      font-size="32" font-weight="700" fill="#9b1a22" letter-spacing="3.5">COMPANY NAME</text>
    <text x="545" y="328" text-anchor="middle"
      font-family="Arial, Helvetica, 'Segoe UI', sans-serif"
      font-size="14" font-weight="500" fill="#9b1a22" letter-spacing="2.8" opacity="0.88">TAGLINE GOES HERE</text>
  </g>
</svg>
