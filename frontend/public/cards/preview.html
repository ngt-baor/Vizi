<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Geo Red SVG Preview</title>
  <style>
    body { margin: 24px; background: #2a2a2a; color: #eee; font-family: system-ui, sans-serif; }
    h1 { font-size: 16px; font-weight: 600; margin: 0 0 16px; }
    .row { display: flex; gap: 24px; flex-wrap: wrap; }
    figure { margin: 0; }
    figcaption { margin-top: 8px; font-size: 13px; opacity: 0.85; }
    img, object { width: 540px; height: auto; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.45); background: #fff; display: block; }
  </style>
</head>
<body>
  <h1>Geo Red — reference SVG art (template #45 uses editable canvas layers, not this file)</h1>
  <div class="row">
    <figure>
      <img src="./geo-red-front.svg?v=2" width="900" height="540" alt="Front" />
      <figcaption>Front — pure vector low-poly</figcaption>
    </figure>
    <figure>
      <img src="./geo-red-back.svg?v=2" width="900" height="540" alt="Back" />
      <figcaption>Back — pure vector contacts + QR</figcaption>
    </figure>
  </div>
</body>
</html>
