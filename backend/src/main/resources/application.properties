spring.application.name=Vizi
server.port=${PORT:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.upload.image-dir=${APP_UPLOAD_IMAGE_DIR:.vizi-uploads/images}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
app.ai.gemini.text-model=${GEMINI_TEXT_MODEL:gemini-3.1-flash-lite}
app.ai.gemini.image-model=${GEMINI_IMAGE_MODEL:gemini-3.1-flash-lite-image}
app.icons8.api-key=${ICONS8_API_KEY:}
app.icons8.search-base-url=${ICONS8_SEARCH_BASE_URL:https://search.icons8.com/api/iconsets/v5/search}

# Local admin bootstrap (override in env for non-dev)
vizi.admin.email=${VIZI_ADMIN_EMAIL:admin@vizi.local}
vizi.admin.password=${VIZI_ADMIN_PASSWORD:}
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB
