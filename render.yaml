services:
  - type: web
    name: vizi-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_UPLOAD_IMAGE_DIR
        value: /tmp/vizi/uploads/images
      - key: BACKGROUND_REMOVAL_BASE_URL
        sync: false
      - key: BACKGROUND_REMOVAL_SHARED_TOKEN
        sync: false
      - key: BACKGROUND_REMOVAL_MODEL
        value: u2netp
      - key: APP_CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://vizi.pages.dev
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VIZI_ADMIN_EMAIL
        sync: false
      - key: VIZI_ADMIN_PASSWORD
        sync: false

  - type: web
    name: vizi-background-removal
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./background-removal/Dockerfile
    dockerContext: ./background-removal
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: REMBG_MODEL
        value: u2netp
      - key: BACKGROUND_REMOVAL_SHARED_TOKEN
        sync: false
